# GitHub에 이 저장소를 올린 뒤, 저장소 Settings → Pages → Source에서
# "GitHub Actions"를 선택하면 푸시할 때마다 공개 페이지가 갱신됩니다.

name: Deploy to GitHub Pages

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      # 저장소 전체(.git 등)를 올리지 않고 공개에 필요한 파일만 묶습니다.
      - name: Assemble site
        run: |
          mkdir -p _site
          cp index.html styles.css .nojekyll _site/
          cp -r assets _site/

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
